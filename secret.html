<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Secret 🔐 — For Niharika</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root{--rose:#e8336d;--blush:#fce4ec;--petal:#f8bbd0;--deep:#880e4f;--soft:#fff0f5}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Lato',sans-serif;background:var(--soft);color:var(--deep);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}

    .petal-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .petal{position:absolute;animation:fallPetal linear infinite;opacity:.5}
    @keyframes fallPetal{0%{transform:translateY(-60px) rotate(0deg);opacity:.6}100%{transform:translateY(110vh) rotate(540deg);opacity:0}}

    .back-btn{position:fixed;top:16px;left:16px;z-index:9999;background:white;border:2px solid var(--petal);color:var(--rose);border-radius:50px;padding:8px 18px;font-size:.9rem;cursor:pointer;box-shadow:0 4px 16px rgba(232,51,109,.15);transition:all .25s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .back-btn:hover{background:var(--rose);color:white;border-color:var(--rose)}
    #musicPill{position:fixed;bottom:18px;right:18px;background:white;border-radius:50px;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 24px rgba(232,51,109,.25);z-index:9999}
    #musicPill .note{font-size:1.1rem;animation:noteBounce 1.2s ease-in-out infinite}
    @keyframes noteBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    #musicPill button{background:var(--rose);color:white;border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem}
    #musicPill span.label{font-size:.75rem;color:var(--rose);font-weight:600;letter-spacing:.5px}

    /* PASSWORD SCREEN */
    #pwScreen{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:80px 24px 40px;position:relative;z-index:10;
      text-align:center;
    }
    .lock-emoji{
      font-size:5rem;margin-bottom:16px;
      animation:lockBounce 2s ease-in-out infinite;
    }
    @keyframes lockBounce{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.1) rotate(5deg)}}

    .pw-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,6vw,2.5rem);color:var(--rose);margin-bottom:8px}
    .pw-sub{font-family:'Playfair Display',serif;font-style:italic;opacity:.7;font-size:clamp(.9rem,2.5vw,1.1rem);margin-bottom:32px}

    .pw-input-wrap{
      position:relative;width:100%;max-width:320px;margin:0 auto 16px;
    }
    #pwInput{
      width:100%;padding:16px 50px 16px 20px;
      border:3px solid var(--petal);border-radius:50px;
      font-size:1.1rem;text-align:center;outline:none;
      font-family:'Lato',sans-serif;
      transition:border .2s,box-shadow .2s;
      background:white;
    }
    #pwInput:focus{border-color:var(--rose);box-shadow:0 0 0 4px rgba(232,51,109,.12)}
    .eye-btn{
      position:absolute;right:18px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;font-size:1.2rem;
    }

    .pw-submit{
      background:linear-gradient(135deg,var(--rose),var(--deep));
      color:white;border:none;padding:14px 44px;border-radius:50px;
      font-size:1.1rem;cursor:pointer;font-family:'Playfair Display',serif;
      box-shadow:0 8px 24px rgba(232,51,109,.35);transition:all .3s;width:100%;max-width:320px;
    }
    .pw-submit:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(232,51,109,.45)}

    .pw-error{
      color:var(--rose);font-size:.9rem;margin-top:10px;
      display:none;animation:shake .4s;
    }
    .pw-error.show{display:block}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

    .hint{font-size:.8rem;color:#ccc;margin-top:14px;letter-spacing:.3px}

    /* SECRET CONTENT */
    #secretContent{
      display:none;padding:80px 20px 80px;position:relative;z-index:10;
    }
    #secretContent.show{display:block;animation:fadeUp .6s cubic-bezier(.16,1,.3,1)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

    .secret-header{text-align:center;margin-bottom:28px}
    .secret-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,6vw,2.5rem);color:var(--rose)}
    .secret-header p{font-family:'Playfair Display',serif;font-style:italic;opacity:.7;margin-top:6px;font-size:.95rem}

    .secret-letter{
      max-width:520px;margin:0 auto;
      background:white;border-radius:28px;
      padding:32px 24px;
      box-shadow:0 12px 45px rgba(232,51,109,.18);
      border:2px solid var(--petal);
      position:relative;overflow:hidden;
    }
    .secret-letter::before{
      content:'';position:absolute;top:0;left:0;right:0;height:5px;
      background:linear-gradient(90deg,var(--rose),var(--deep));
    }
    .letter-deco{text-align:center;font-size:2.5rem;margin-bottom:16px}

    .letter-text{
      font-family:'Playfair Display',serif;font-style:italic;
      font-size:1rem;line-height:1.9;color:#555;
      white-space:pre-wrap;border-left:3px solid var(--petal);padding-left:16px;
      min-height:40px;
    }

    .lock-again-btn{
      display:block;margin:24px auto 0;
      background:var(--blush);color:var(--rose);border:2px solid var(--petal);
      padding:10px 28px;border-radius:50px;font-size:.9rem;cursor:pointer;
      transition:all .25s;
    }
    .lock-again-btn:hover{background:var(--rose);color:white;border-color:var(--rose)}

    /* FLOATING HEARTS */
    .heart-rain span{
      position:fixed;font-size:2rem;pointer-events:none;z-index:99;
      animation:heartRain linear forwards;
    }
    @keyframes heartRain{0%{transform:translateY(-50px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}

    .click-heart{position:fixed;pointer-events:none;z-index:9998;font-size:2rem;animation:chAnim 1.5s forwards}
    @keyframes chAnim{0%{opacity:1;transform:translateY(0) scale(.5)}30%{transform:translateY(-30px) scale(1.3)}100%{opacity:0;transform:translateY(-100px) scale(.8)}}
  </style>
</head>
<body>
<div class="petal-bg" id="petalBg"></div>
<audio id="bgMusic" loop>
  <source src="https://raw.githubusercontent.com/ashraful1625/niharika-valentine/main/niharika-love-song.mp3">
</audio>
<a href="dashboard.html" class="back-btn">← Dashboard</a>
<div id="musicPill">
  <span class="note">🎵</span><span class="label">Our Song</span>
  <button id="musicBtn" onclick="toggleMusic()">▶</button>
</div>

<!-- PASSWORD SCREEN -->
<div id="pwScreen">
  <div class="lock-emoji">🔐</div>
  <h1 class="pw-title">Secret Message</h1>
  <p class="pw-sub">Only one person holds the key to this letter…</p>

  <div class="pw-input-wrap">
    <input type="password" id="pwInput" placeholder="Enter the secret word…"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button class="eye-btn" onclick="toggleEye()" id="eyeBtn">👁</button>
  </div>

  <button class="pw-submit" onclick="checkPw()">Open the Letter 💌</button>
  <div class="pw-error" id="pwError">❌ That's not the magic word. Try again, love…</div>
  <div class="hint">Hint: It's the name of the one this whole website is for 💕</div>
</div>

<!-- SECRET CONTENT -->
<div id="secretContent">
  <div class="secret-header">
    <h1>For Your Eyes Only 💌</h1>
    <p>My most honest, most tender words — just for you</p>
  </div>
  <div class="secret-letter">
    <div class="letter-deco">💌</div>
    <div class="letter-text" id="secretText"></div>
  </div>
  <button class="lock-again-btn" onclick="lockAgain()">🔐 Lock it again</button>
</div>

<script>
const SECRET_LETTER = `My darling Niharika,

If you're reading this, you found the key. And that means this was always meant for you.

I have wanted to say so many things to you. Things that feel too big for ordinary conversations. Things I keep tucking away in quiet moments, saving for the right time.

This is that time.

I love you in a way that surprises me sometimes. It sneaks up on me — when I hear a song, when I see something beautiful, when someone asks me what makes me happy. And the answer is always, effortlessly, you.

You are the most remarkable woman I have ever known. Not just because of how you look, or how you laugh (though both of those things make my heart absolutely stop) — but because of who you are. The way you care. The way your mind works. The way you make the world feel warmer just by being in it.

I think about our future sometimes. The ordinary moments we haven't had yet. Morning tea together. Getting lost somewhere beautiful. Arguments about nothing. Making up. Growing old with you.

I want all of it, Niharika. Every single day of it.

You deserve someone who chooses you every morning before they've even had coffee. Someone who thinks you are the most beautiful mystery they ever had the privilege of trying to understand.

That someone is me.

This is my most honest, most guarded, most real confession:

I am completely, hopelessly, joyfully in love with you.

And I wouldn't change it for anything in the world.

All of me, always yours —
Ashraful💖`;

function checkPw() {
  const val = document.getElementById('pwInput').value.trim().toLowerCase();
  const err = document.getElementById('pwError');
  if (val === 'niharika') {
    document.getElementById('pwScreen').style.display = 'none';
    const sc = document.getElementById('secretContent');
    sc.classList.add('show');
    typeSecret();
    heartRain();
  } else {
    err.classList.remove('show');
    void err.offsetWidth;
    err.classList.add('show');
    document.getElementById('pwInput').value = '';
    setTimeout(() => err.classList.remove('show'), 3000);
  }
}

let typeTimer = null;
function typeSecret() {
  const el = document.getElementById('secretText');
  el.textContent = '';
  let i = 0;
  function next() {
    if (i < SECRET_LETTER.length) {
      el.textContent += SECRET_LETTER[i];
      i++;
      typeTimer = setTimeout(next, 20);
    }
  }
  next();
}

function lockAgain() {
  if (typeTimer) clearTimeout(typeTimer);
  document.getElementById('secretContent').classList.remove('show');
  document.getElementById('secretContent').style.display = '';
  document.getElementById('secretContent').style.cssText = '';
  document.getElementById('pwScreen').style.display = '';
  document.getElementById('pwInput').value = '';
  document.getElementById('secretText').textContent = '';
}

function toggleEye() {
  const inp = document.getElementById('pwInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function heartRain() {
  const hearts = ['❤️','💖','💕','🌹','💘','✨'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const span = document.createElement('span');
      span.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.animationDuration = (3 + Math.random() * 4) + 's';
      span.style.animationDelay = '0s';
      span.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
      document.body.appendChild(span);
      setTimeout(() => span.remove(), 7000);
    }, i * 100);
  }
}

// PETALS
const emojis = ['🌸','🌺','🌹','💮','🪷'];
const bg = document.getElementById('petalBg');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div'); p.className = 'petal';
  p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (5 + Math.random() * 9) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  p.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
  bg.appendChild(p);
}

// CLICK HEARTS
document.addEventListener('click', function(e) {
  if (e.target.tagName === 'BUTTON' || e.target.closest('a') || e.target.tagName === 'INPUT') return;
  const el = document.createElement('div'); el.className = 'click-heart';
  el.textContent = ['❤️','💖','💕','🌹'][Math.floor(Math.random()*4)];
  el.style.left = e.clientX + 'px'; el.style.top = e.clientY + 'px';
  document.body.appendChild(el); setTimeout(() => el.remove(), 1600);
});

// MUSIC
const audio = document.getElementById('bgMusic');
const btn = document.getElementById('musicBtn');
let playing = false;
function toggleMusic() {
  if (playing) { audio.pause(); btn.textContent = '▶'; playing = false; }
  else { audio.play(); btn.textContent = '⏸'; playing = true; }
}
document.addEventListener('click', function a() {
  audio.volume = 0.4; audio.play().then(() => { playing = true; btn.textContent = '⏸'; }).catch(()=>{});
  document.removeEventListener('click', a);
}, { once: true });
</script>
</body>
</html>
